name: Build Flet APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.16.9'

      - name: Accept Android Licenses
        run: |
          flutter config --no-analytics
          yes | flutter doctor --android-licenses || true

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Build APK
        # ဤနေရာတွင် echo "y" | ကို အပြီးတိုင် ဖယ်ရှားလိုက်ပါပြီ
        run: flet build apk --project teacher_match --product "Teacher Match" --org com.agency.teachermatch

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: build/apk/**/*.apk